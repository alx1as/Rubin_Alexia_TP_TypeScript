<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <form id="loginUser" class="contenedor-login">
        <h1>Food Store</h1>
        <h2>Iniciar sesión</h2>

        <label for="email">Email:</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="usuario@gmail.com"
            required
        >

        <label for="password">Contraseña:</label>
        <input
            type="password"
            id="password"
            name="password"
            placeholder="contraseñaSegura12"
            required
        >

        <button type="submit">Ingresar</button>

        <p>¿No tenés cuenta? <a href="/src/pages/auth/registro/registro.html">Registrate</a></p>
    </form>

    <script type="module" src="/src/pages/auth/login/login.ts"></script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
